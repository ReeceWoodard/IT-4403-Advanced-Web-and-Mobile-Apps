<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone 3 | Book Finder SPA</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Book Finder SPA</h1>
            <p>Milestone 3 - Single Page Application using AJAX</p>
        </header>

        <section class="search-section">
            <h2>Search Books</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Enter keywords to search books">
                <button id="searchBtn">Search</button>
            </div>
        </section>

        <section class="results-section">
            <div class="section-header">
                <h2>Search Results</h2>
                <p id="pageIndicator">Page 1 of 5</p>
            </div>

            <div id="results" class="book-grid"></div>

            <div id="pagination" class="pagination"></div>
        </section>

        <section class="details-section">
            <h2>Book Details</h2>
            <div id="details">
                <p>Click on a book to see details here.</p>
            </div>
        </section>

        <section class="collection-section">
            <h2>Public Bookshelf Collection</h2>
            <p class="collection-note">Click on a book below to view its details.</p>
            <div id="collection" class="book-grid"></div>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
