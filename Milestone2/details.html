<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<header>
    <h1>Book Details</h1>
    <h2>Milestone 2 - IT 4403</h2>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="bookshelf.html">My Bookshelf</a>
</nav>

<main>
    <div id="bookDetails"></div>
</main>

<script>
$(document).ready(function () {
    function getParameterByName(name) {
        var url = window.location.href;
        name = name.replace(/[\[\]]/g, "\\$&");
        var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
        var results = regex.exec(url);

        if (!results) {
            return null;
        }

        if (!results[2]) {
            return "";
        }

        return decodeURIComponent(results[2].replace(/\+/g, " "));
    }

    var bookId = getParameterByName("id");

    if (!bookId) {
        $("#bookDetails").html("<p>No book ID was provided.</p>");
        return;
    }

    var apiKey = "AIzaSyD1LDXycgXy_MazXWbDpqpYApRHg3U2g0w";
    var url = "https://www.googleapis.com/books/v1/volumes/" + bookId + "?key=" + apiKey;

    $.getJSON(url, function (data) {
        var book = data.volumeInfo;
        var sale = data.saleInfo;

        var authors = "N/A";
        if (book.authors) {
            authors = book.authors.join(", ");
        }

        var price = "Not available";
        if (sale && sale.listPrice) {
            price = sale.listPrice.amount + " " + sale.listPrice.currencyCode;
        }

        var image = "";
        if (book.imageLinks && book.imageLinks.thumbnail) {
            image = '<img src="' + book.imageLinks.thumbnail + '" alt="Book cover">';
        }

        var html = '<div class="details-card">';
        html += image;
        html += '<h2>' + (book.title || "No title available") + '</h2>';
        html += '<p><strong>Authors:</strong> ' + authors + '</p>';
        html += '<p><strong>Publisher:</strong> ' + (book.publisher || "N/A") + '</p>';
        html += '<p><strong>Published Date:</strong> ' + (book.publishedDate || "N/A") + '</p>';
        html += '<p><strong>Price:</strong> ' + price + '</p>';

        if (book.description) {
            html += '<h3>Description</h3>';
            html += '<p>' + book.description + '</p>';
        }

        html += '</div>';

        $("#bookDetails").html(html);
    }).fail(function () {
        $("#bookDetails").html("<p>There was an error retrieving book details.</p>");
    });
});
</script>

</body>
</html>
