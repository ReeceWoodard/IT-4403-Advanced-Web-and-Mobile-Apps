<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT eBooks - Search Results</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #003366;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #e6e6e6;
            padding: 10px;
            text-align: center;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #003366;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            padding: 20px;
        }

        .book-card {
            background-color: #f4f4f4;
            border-left: 5px solid #003366;
            padding: 20px;
            margin-bottom: 20px;
        }

        .book-card img {
            max-width: 150px;
            display: block;
            margin-bottom: 15px;
        }

        .book-card h2 {
            margin-top: 0;
            color: #003366;
        }

        .book-links a {
            display: inline-block;
            margin-right: 15px;
            color: #003366;
            font-weight: bold;
            text-decoration: none;
        }

        .book-links a:hover {
            text-decoration: underline;
        }

        footer {
            background-color: #003366;
            color: #ffffff;
            text-align: center;
            padding: 10px;
            margin-top: auto;
        }
    </style>
</head>
<body>

<header>
    <h1>IT eBooks - Search Results</h1>
    <h2>IT 4403 Individual Project</h2>
</header>

<nav>
    <a href="index.html">Home</a>
</nav>

<main>
    <div id="bookList"></div>
</main>

<footer>
    <p>2026 IT 4403</p>
</footer>

<script>
$(document).ready(function () {
    $.getJSON("it-ebooks-search.json", function (data) {
        var html = "";

        $.each(data.Books, function (index, book) {
            html += '<div class="book-card">';

            if (book.Image) {
                html += '<img src="' + book.Image + '" alt="Book cover">';
            }

            html += '<h2>' + book.Title + '</h2>';

            if (book.SubTitle) {
                html += '<p><strong>Subtitle:</strong> ' + book.SubTitle + '</p>';
            }

            html += '<p><strong>Description:</strong> ' + (book.Description || "N/A") + '</p>';
            html += '<p><strong>ISBN:</strong> ' + (book.isbn || "N/A") + '</p>';

            html += '<div class="book-links">';
            if (book.isbn) {
                html += '<a href="https://isbnsearch.org/isbn/' + book.isbn + '" target="_blank">View ISBN</a>';
            }
            html += '</div>';

            html += '</div>';
        });

        $("#bookList").html(html);
    });
});
</script>

</body>
</html>
