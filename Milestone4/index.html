<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Book Finder SPA - Milestone 4</title>

<link rel="stylesheet" href="style.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/mustache@latest/mustache.min.js"></script>
</head>
<body>

<header>
<h1>Book Finder SPA</h1>

<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search books...">
<button id="searchBtn">Search</button>
</div>

<div class="view-controls">
<button id="gridView">Grid View</button>
<button id="listView">List View</button>
</div>

<div class="tabs">
<button id="showSearch">Search Results</button>
<button id="showCollection">Collection</button>
</div>
</header>

<main>

<section id="collectionPanel">
<h2>Public Collection</h2>

<button id="popularBooks">Popular Books</button>
<button id="topRatedBooks">Top Rated Picks</button>

<div id="collectionResults" class="grid-view"></div>
</section>

<section id="searchPanel">
<h2>Search Results</h2>

<div id="results" class="grid-view"></div>

<div id="pagination">
<button id="prevPage">Previous</button>
<span id="pageInfo">Page 1</span>
<button id="nextPage">Next</button>
</div>
</section>

<section id="detailsPanel">
<h2>Book Details</h2>
<div id="details">
Select a book to view details.
</div>
</section>

</main>

<script id="book-template" type="text/template">
<div class="book-card" onclick="loadDetails('{{id}}')">
    <img src="{{thumbnail}}" alt="{{title}}">
    <h3>{{title}}</h3>
    <p>{{authors}}</p>
</div>
</script>

<script id="detail-template" type="text/template">
<div class="detail-card">
    <img src="{{thumbnail}}" alt="{{title}}">
    <div>
        <h2>{{title}}</h2>
        <p><strong>Author:</strong> {{authors}}</p>
        <p><strong>Language:</strong> {{language}}</p>
        <p><strong>Pages:</strong> {{pages}}</p>
        <p>{{description}}</p>
    </div>
</div>
</script>

<script src="script.js"></script>

</body>
</html>
