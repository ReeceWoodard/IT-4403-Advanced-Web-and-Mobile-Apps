<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookshelf</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<header>
    <h1>My Bookshelf</h1>
    <h2>Milestone 2 - IT 4403</h2>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="bookshelf.html">My Bookshelf</a>
</nav>

<main>
    <div id="bookshelfResults"></div>
</main>

<script>
$(document).ready(function () {
    var volumeIds = [
        "zyTCAlFPjgYC",
        "uWLGDwAAQBAJ",
        "1wy49i_gQjIC"
    ];

    var html = "";
    var completed = 0;

    $.each(volumeIds, function (index, id) {
        var url = "https://www.googleapis.com/books/v1/volumes/" + id;

        $.getJSON(url, function (data) {
            var book = data.volumeInfo;
            var title = book.title || "No title available";
            var image = "";

            if (book.imageLinks && book.imageLinks.thumbnail) {
                image = '<img src="' + book.imageLinks.thumbnail + '" alt="Book cover">';
            }

            html += '<div class="book-card">';
            html += image;
            html += '<h3><a href="details.html?id=' + data.id + '">' + title + '</a></h3>';
            html += '</div>';

            completed++;

            if (completed === volumeIds.length) {
                $("#bookshelfResults").html(html);
            }
        }).fail(function () {
            completed++;

            if (completed === volumeIds.length) {
                $("#bookshelfResults").html(html + "<p>Some books could not be loaded.</p>");
            }
        });
    });
});
</script>

</body>
</html>
